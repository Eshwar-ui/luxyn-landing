name: CI and Deploy to Firebase Hosting (live)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: false

jobs:
  quality_gate:
    name: Test, build, and verify static export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Run CI checks
        run: npm run ci

      - name: Upload tested static export
        uses: actions/upload-artifact@v4
        with:
          name: firebase-static-export
          path: out
          if-no-files-found: error
          retention-days: 7

  deploy_live:
    name: Deploy tested export to live Hosting
    needs: quality_gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download tested static export
        uses: actions/download-artifact@v4
        with:
          name: firebase-static-export
          path: out

      - name: Deploy to Firebase Hosting live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: luxyn-landing
