name: CI and Deploy to Firebase Hosting (PR preview)

on:
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: firebase-hosting-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality_gate:
    name: Test, build, and verify static export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Run CI checks
        run: npm run ci

      - name: Upload tested static export
        uses: actions/upload-artifact@v4
        with:
          name: firebase-static-export-pr-${{ github.event.pull_request.number }}
          path: out
          if-no-files-found: error
          retention-days: 7

  deploy_preview:
    name: Deploy tested export to preview Hosting
    needs: quality_gate
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download tested static export
        uses: actions/download-artifact@v4
        with:
          name: firebase-static-export-pr-${{ github.event.pull_request.number }}
          path: out

      - name: Deploy preview to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: luxyn-landing
